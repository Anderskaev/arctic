name: Deploy Backend

on: 
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'backend/**' 

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' 
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: restart
        run: touch ./backend/.restart-app
      
      - name: Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./backend/
          server-dir: /mta.anderskaev.ru/
          exclude: |
            README.md
            passenger_wsgi.py
