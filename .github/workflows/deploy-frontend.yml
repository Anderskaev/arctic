name: Deploy Backend

on: 
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'frontend/meet-arctic-front/**' 

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend/meet-arctic-front   
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 
          cache: 'npm'
          cache-dependency-path: './frontend/meet-arctic-front/package-lock.json' 

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build
      
      - name: Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/meet-arctic-front/build/
          server-dir: /mta.anderskaev.ru/